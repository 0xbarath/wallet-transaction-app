server:
  port: 8080

spring:
  application:
    name: wallet-transaction-app
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.sql

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  alchemy:
    rpc-url: ${ALCHEMY_RPC_URL:}
    api-key: ${ALCHEMY_API_KEY:}
    categories: EXTERNAL,INTERNAL,ERC20,ERC721,ERC1155
    max-count: 1000
    timeout: 30s
    retry-max-attempts: 3
  rate-limit:
    tokens-per-second: 2
    capacity: 5
  prompt-parser:
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-20250514
    timeout: 30s
    max-tokens: 1024
  enrichment:
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-20250514
    timeout: 30s
    max-tokens: 2048
